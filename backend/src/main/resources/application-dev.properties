# JDBC connection URL for the local PostgreSQL development database.
# Format: jdbc:postgresql://<host>:<port>/<database_name>
spring.datasource.url=jdbc:postgresql://localhost:5432/user_admin_system

# Database username used by the application to connect to PostgreSQL.
spring.datasource.username=user_admin_app

# Database password used by the application to connect to PostgreSQL.
spring.datasource.password=password123

# Controls how Hibernate handles the database schema at startup.
# "update" will create missing tables/columns and update the schema when entities change.
# Convenient for development, but not recommended for production.
spring.jpa.hibernate.ddl-auto=update

# Logs generated SQL statements to the console.
# Useful for development and debugging.
spring.jpa.show-sql=true

# Formats logged SQL so it is easier to read in the console.
spring.jpa.properties.hibernate.format_sql=true

# Disables Spring SQL initialization scripts such as schema.sql and data.sql.
# Useful when Hibernate is managing the schema instead.
spring.sql.init.mode=never