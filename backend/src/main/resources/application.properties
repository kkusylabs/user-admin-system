# Name of the Spring Boot application.
# This is mainly used for identification in logs, monitoring, and Spring features.
spring.application.name=user-admin-app

# Port the embedded web server will listen on.
# The application will be available locally at http://localhost:8080
server.port=8080

# JWT lifetime in milliseconds.
# 86400000 = 24 hours.
# After this time, the token expires and the user must log in again.
app.jwt.expiration-millis=86400000

# Secret key used to sign JWT tokens.
# For real deployments, override this with an environment variable or external config.
app.jwt.secret=${APP_JWT_SECRET:your-super-long-random-secret-key-at-least-32-bytes}

# Fully qualified JDBC driver class for PostgreSQL.
spring.datasource.driver-class-name=org.postgresql.Driver

# Tells Hibernate to generate SQL optimized for PostgreSQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect